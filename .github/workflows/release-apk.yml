name: Release APK On Tag

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install .NET MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore
        run: >
          dotnet restore
          src/Maui.CdvSchedule.App/Maui.CdvSchedule.App.csproj
          -p:CheckEolTargetFramework=false

      - name: Build APK
        run: >
          dotnet publish
          src/Maui.CdvSchedule.App/Maui.CdvSchedule.App.csproj
          -c Release
          -f net8.0-android
          -p:AndroidPackageFormat=apk
          -p:EmbedAssembliesIntoApk=true
          -p:CheckEolTargetFramework=false

      - name: Collect APK
        shell: bash
        run: |
          set -euo pipefail

          base_path="src/Maui.CdvSchedule.App/bin/Release/net8.0-android"

          apk_path="$(find "$base_path" -type f -name '*Signed.apk' | head -n 1 || true)"
          if [ -z "$apk_path" ]; then
            apk_path="$(find "$base_path" -type f -name '*.apk' | head -n 1 || true)"
          fi

          if [ -z "$apk_path" ]; then
            echo "No APK found in $base_path"
            exit 1
          fi

          cp "$apk_path" Maui.CdvSchedule.apk
          ls -lh Maui.CdvSchedule.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: Maui.CdvSchedule.apk
